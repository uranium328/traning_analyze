name: AI Cycling Coach

on:
  schedule:
    - cron: '0 * * * *'   # 每小時整點執行
  workflow_dispatch:        # 允許手動觸發（測試用）

permissions:
  contents: write           # 允許 commit processed_ids.txt 回 repo

jobs:
  run-coach:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 取得程式碼 ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. 設定 Python 環境（garminconnect 0.3.6 需要 Python >= 3.12）─────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. 執行主程式 ────────────────────────────────────────────────────
      # 認證改用 Garmin token：GARMINTOKENS secret 由本機 login_setup.py 匯出的
      # base64 token 字串（效期約一年），main.py 直接從環境變數還原登入，
      # 不再需要 tokens.json 檔案，也不需要每小時回寫 secret（故已移除 GH_PAT 步驟）。
      - name: Run AI Coach
        env:
          GARMINTOKENS:        ${{ secrets.GARMINTOKENS }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      # ── 4. 把更新後的 processed_ids.txt commit 回 repo ──────────────────
      # [skip ci] 標記讓這個 commit 不會觸發新一輪 workflow
      - name: Commit processed_ids.txt
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add processed_ids.txt
          git diff --staged --quiet || git commit -m "chore: update processed activity IDs [skip ci]"
          git push
